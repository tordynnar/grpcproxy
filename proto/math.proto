syntax = "proto3";

package grpcproxy;

option go_package = "github.com/tordynnar/grpcproxy/pb";

service MathService {
  rpc Add(AddRequest) returns (AddResponse);
  rpc Fibonacci(FibRequest) returns (stream FibResponse);
}

message AddRequest {
  int64 a = 1;
  int64 b = 2;
}

message AddResponse {
  int64 result = 1;
  string source = 2;
}

message FibRequest {
  int32 count = 1;
}

message FibResponse {
  int64 value = 1;
  string source = 2;
}
